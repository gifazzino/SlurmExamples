# CommonFramework configuration
stage: graph_construction
model: MetricLearning
input_dir: /mnt/data1/dkarres/gnn-seeding/pu200_uncorr_pyg/feature_store/  # Should contain the files used in training and inference
stage_dir: /mnt/data2/gfazzino/ATLAS_seeding/metric_learning # A directory to be created that will store logs, artifacts, and output data
project: seeding_ML # Used in logging
accelerator: gpu
devices: 1
nodes: 1

# Dataset parameters
data_split: [800, 100, 100] # Number of [training, validation, testing] examples

hard_cuts: 
  hit_r: [0, 310]
  hit_phi: [0.1, 0.7]
  hit_z: [-150, 250]

weighting:
  - weight: 1.0
    conditions: 
      edge_y: False

  - weight: 0.0
    conditions: 
      edge_y: True

  - weight: 4.0
    conditions: 
      track_particle_nhits: [3, .inf]
      track_particle_pdgId: [not_in, [11, -11]]
      track_particle_primary: True
      track_particle_eta: [0.1, 0.3]
      track_particle_phi: [0.3, 0.5]
      track_particle_pt: [1000, .inf]
      edge_y: True

# Model parameters
undirected: True
train_undirected: True
node_features: [r,    phi,   z]
node_scales:   [1000, 3.14,  1000]
emb_hidden: 1024
nb_layer: 4
emb_dim: 12
activation: Tanh
randomisation: 1
points_per_batch: 100000
r_train: 0.1
knn: 100
knn_val: 1000

# Training parameters
warmup: 5
margin: 0.1
lr: 0.01
factor: 0.7
patience: 10
max_epochs: 100
metric_to_monitor: f1
metric_mode: max

event_prefix: "ttbar_uncorr_pu200_v9"
